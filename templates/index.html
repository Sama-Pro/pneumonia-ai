<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pneumonia Detection AI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .card {
            border-radius: 15px;
        }

        #uploadedImg {
            max-width: 100%;
            border-radius: 10px;
            border: 2px solid #ddd;
            margin-top: 15px;
            display: none;
        }

        #resultBox {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
            display: none;
        }

        .pneumonia {
            background-color: #ffdddd;
            color: #c0392b;
        }

        .normal {
            background-color: #ddffdd;
            color: #27ae60;
        }

        #messageBox {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="card shadow p-4 text-center">

        <h2 class="mb-4">🩺 Pneumonia Detection AI</h2>

        <!-- File Upload -->
        <input type="file" id="fileInput" class="form-control mb-3" accept="image/*">

        <!-- Buttons -->
        <div class="d-flex justify-content-center gap-2">
            <button id="predictBtn" class="btn btn-primary"
                onclick="this.innerText='Analyzing...'">
                Predict
            </button>

            <button id="downloadBtn" class="btn btn-success" style="display:none;">
                Download X-ray
            </button>
        </div>

        <!-- Message -->
        <div id="messageBox"></div>

        <!-- Image Preview -->
        <img id="uploadedImg" src="" alt="Uploaded X-ray">

        <!-- Result Box -->
        <div id="resultBox">
            <div id="result"></div>
            <div id="confidence"></div>
        </div>

    </div>
</div>

<script src="{{ url_for('static', filename='main.js') }}"></script>

</body>
</html>
